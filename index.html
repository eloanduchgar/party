function questionsBirthday(name) {

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function hashQuestion(text) {
  let h = 0;
  for (let i = 0; i < text.length; i++) { h = (h * 31 + text.charCodeAt(i)) | 0; }
  return "h" + (h >>> 0).toString(36);
}

function getAllDefaultsByHash(birthdayName) {
  const map = {};
  QUESTIONS_CLASSIC.forEach(q => { map[hashQuestion(q)] = q; });
  QUESTIONS_HOT.forEach(q => { map[hashQuestion(q)] = q; });
  questionsBirthday(birthdayName).forEach(q => { map[hashQuestion(q)] = q; });
  return map;
}

function effectiveDefaultList(opts) {
  let list = QUESTIONS_CLASSIC.slice();
  if (opts.hotMode) list = list.concat(QUESTIONS_HOT);
  if (opts.birthdayMode) list = list.concat(questionsBirthday(opts.birthdayName));
  const removed = opts.removedDefaults || {};
  const edited = opts.editedDefaults || {};
  return list
    .map(q => {
      const h = hashQuestion(q);
      if (removed[h]) return null;
      return edited[h] || q;
    })
    .filter(Boolean);
}

function buildPool(opts) {
  const defaults = effectiveDefaultList(opts);
  const customs = opts.customQuestions ? Object.values(opts.customQuestions) : [];
  const base = shuffle(defaults).slice(0, Math.min(defaults.length, 20));
  return shuffle(base.concat(customs));
}

function makeId() {
  return "p" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}
function makeCode() {
  const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ";
  let c = "";
  for (let i = 0; i < 4; i++) c += letters[Math.floor(Math.random() * letters.length)];
  return c;
}
function escapeHtml(s) {
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

/* -------------------------------- FIRESTORE-LIKE HELPERS -------------------- */

async function roomExists(code) {
  try {
    const snap = await get(ref(db, "rooms/" + code + "/state"));
    return snap.exists();
  } catch (e) {
    return false;
  }
}

async function createRoomInDb(code, initialState, player) {
  await set(ref(db, "rooms/" + code + "/state"), initialState);
  await set(ref(db, "rooms/" + code + "/players/" + player.id), player);
}

async function addPlayer(code, player) {
  await set(ref(db, "rooms/" + code + "/players/" + player.id), player);
}

async function updateRoomState(code, partial) {
  await update(ref(db, "rooms/" + code + "/state"), partial);
}

async function submitVote(code, round, playerId, targetId) {
  await set(ref(db, "rooms/" + code + "/votes/" + round + "/" + playerId), targetId);
}

function buildRoomFromVal(val) {
  if (!val || !val.state) return null;
  const state = val.state;
  const playersObj = val.players || {};
  const players = Object.values(playersObj).sort((a, b) => a.joinedAt - b.joinedAt);
  let votes = {};
  if (state.status === "question" || state.status === "results") {
    votes = (val.votes && val.votes[state.round]) || {};
  }
  return Object.assign({}, state, { players: players, votes: votes });
}

  isAdmin: false,

  showManager: false,
  qm: { editingKey: null, editingText: "", newCustomText: "" },
};

const root = document.getElementById("app-root");

function resetToHome() {
  if (S.unsub) { S.unsub(); S.unsub = null; }
  S.code = null;
  S.room = null;
  S.isAdmin = false;
  S.mode = "home";
  S.error = "";
  S.showManager = false;
  S.qm = { editingKey: null, editingText: "", newCustomText: "" };
  render();
}

function startListening(code) {
  if (S.unsub) { S.unsub(); S.unsub = null; }
  S.connected = true;
  S.unsub = onValue(
    ref(db, "rooms/" + code),
    (snapshot) => {
      S.connected = true;
      S.room = buildRoomFromVal(snapshot.val());
      render();
    },
    (err) => {
      S.connected = false;
      render();
    }
  );
}

/* -------------------------------- ACTIONS ----------------------------------- */

async function handleCreate() {
  if (!S.myName.trim()) { S.error = "Entre ton prénom pour continuer."; render(); return; }
  S.busy = true; S.error = ""; render();
  let c = makeCode();
  let tries = 0;
  while ((await roomExists(c)) && tries < 8) { c = makeCode(); tries++; }
  const initial = {
    code: c, hostId: S.myId, hostName: S.myName.trim(),
    hotMode: false, birthdayMode: false, birthdayName: "Julian",
    status: "lobby", questions: [], round: 0, createdAt: Date.now(),
  };
  const player = { id: S.myId, name: S.myName.trim(), joinedAt: Date.now() };
  try {
    await createRoomInDb(c, initial, player);
  } catch (e) {
    S.busy = false;
    S.error = "Impossible de créer le salon. Vérifie ta connexion et réessaie.";
    render();
    return;
  }
  S.isAdmin = true; S.code = c; S.busy = false;
  render();
  startListening(c);
}

async function handleJoin() {
  const c = S.joinCodeInput.trim().toUpperCase();
  if (!S.myName.trim()) { S.error = "Entre ton prénom pour continuer."; render(); return; }
  if (c.length !== 4) { S.error = "Le code fait 4 lettres."; render(); return; }
  S.busy = true; S.error = ""; render();
  const exists = await roomExists(c);
  if (!exists) { S.error = "Ce code ne correspond à aucune partie en cours."; S.busy = false; render(); return; }
  try {
    await addPlayer(c, { id: S.myId, name: S.myName.trim(), joinedAt: Date.now() });
  } catch (e) {
    S.busy = false;
    S.error = "Impossible de rejoindre le salon. Vérifie ta connexion et réessaie.";
    render();
    return;
  }
  S.isAdmin = false; S.code = c; S.busy = false;
  render();
  startListening(c);
}

async function handleStartGame() {
  if (!S.room) return;
  S.busy = true; S.showManager = false; render();
  const questions = buildPool({
    hotMode: S.room.hotMode,
    birthdayMode: S.room.birthdayMode,
    birthdayName: S.room.birthdayName,
    removedDefaults: S.room.removedDefaults,
    editedDefaults: S.room.editedDefaults,
    customQuestions: S.room.customQuestions,
  });
  await updateRoomState(S.code, { status: "question", round: 0, questions: questions });
  S.busy = false;
}

  if (!S.room) return;
  await updateRoomState(S.code, { [key]: !S.room[key] });
}

async function saveBirthdayName() {

}

  S.qm.editingKey = null; S.qm.editingText = "";

}

    await updateRoomState(S.code, { status: "ended" });
  } else {
    await updateRoomState(S.code, { status: "question", round: nextRound });

  if (!S.code) return;

      setTimeout(() => { S.copied = false; render(); }, 1500);
    });
  }
}

/* -------------------------------- CONFETTI ---------------------------------- */

let confettiPieces = null;
function confettiHtml(active) {
  if (!active) return "";
  if (!confettiPieces) {
    const colors = ["#ff3e8e", "#ffd23f", "#3eeac0", "#ff8a3e", "#a78bfa"];
    confettiPieces = Array.from({ length: 26 }).map((_, i) => ({
      left: Math.random() * 100,
      size: 6 + Math.random() * 8,
      color: colors[i % colors.length],
      duration: 4 + Math.random() * 4,
      delay: Math.random() * 6,
    }));
  }
  return confettiPieces.map(p =>
    '<div class="confetti-piece" style="left:' + p.left + '%;width:' + p.size + 'px;height:' + (p.size * 0.5) + 'px;background:' + p.color + ';animation-duration:' + p.duration + 's;animation-delay:' + p.delay + 's;"></div>'
  ).join("");
}

/* --------------------------------- RENDER ----------------------------------- */

function render() {
  const birthdayActive = S.room && S.room.birthdayMode;
  let inner = confettiHtml(birthdayActive);
  inner += '<div class="wrap">';

  if (!S.connected && S.code) {
    inner += '<div class="conn-dot offline" style="margin-bottom:10px;justify-content:center;display:flex;"><span class="dot"></span> Connexion perdue, nouvelle tentative…</div>';
  }

  if (!S.code && S.mode === "home") inner += homeScreen();
  else if (!S.code && S.mode === "create") inner += nameEntryScreen("Créer une partie", "Tu seras l'animateur·rice de la soirée.", "Créer le salon", "create");
  else if (!S.code && S.mode === "join") inner += joinScreen();
  else if (S.code && !S.room) inner += loadingScreen();
  else if (S.code && S.room && S.room.status === "lobby") inner += (S.showManager ? manageQuestionsScreen() : lobbyScreen());
  else if (S.code && S.room && S.room.status === "question") inner += questionScreen();
  else if (S.code && S.room && S.room.status === "results") inner += resultsScreen();
  else if (S.code && S.room && S.room.status === "ended") inner += endScreen();

  inner += '</div>';
  root.innerHTML = inner;
  bindEvents();
}

function homeScreen() {
  return (
    '<div class="col gap-4 pop" style="align-items:center;">' +
      '<div class="col gap-3 text-center" style="align-items:center;">' +
        '<div class="row gap-2" style="align-items:center;">' +
          '<span style="font-size:1.6rem;">🎉</span>' +
          '<h1 class="display" style="font-size:2.2rem;font-weight:800;margin:0;">Qui, parmi nous ?</h1>' +
        '</div>' +
        '<p class="muted small" style="max-width:320px;">Le jeu de soirée où on découvre ce que le groupe pense vraiment de chacun. Un salon, un code, tous les téléphones connectés.</p>' +
      '</div>' +
      '<div class="card col gap-3" style="padding:24px;width:100%;">' +
        '<button class="btn btn-primary" id="btn-create"><span class="display">Créer une partie</span> 👑</button>' +
        '<button class="btn btn-secondary" id="btn-join"><span class="display">Rejoindre avec un code</span> 👥</button>' +
      '</div>' +
      '<p class="xs muted text-center" style="max-width:320px;">Un joueur crée la partie et devient l\'animateur·rice. Les autres rejoignent depuis leur téléphone avec le code affiché.</p>' +
    '</div>'
  );
}

function nameEntryScreen(title, subtitle, ctaLabel) {
  return (
    '<div class="card col gap-4 pop" style="padding:24px;">' +
      '<button class="btn-link" id="btn-back" style="width:fit-content;">← Retour</button>' +
      '<div><h2 class="display" style="font-size:1.5rem;font-weight:700;margin:0;">' + title + '</h2><p class="muted small" style="margin:4px 0 0;">' + subtitle + '</p></div>' +
      '<div><label class="field-label">Ton prénom</label><input type="text" id="input-name" placeholder="Ex : Camille" maxlength="20" value="' + escapeHtml(S.myName) + '" /></div>' +
      (S.error ? '<p class="small" style="color:#ff9ec9;margin:0;">' + escapeHtml(S.error) + '</p>' : '') +
      '<button class="btn btn-primary" id="btn-submit-create" ' + (S.busy ? 'disabled' : '') + '>' + (S.busy ? '<span class="spin">⏳</span>' : '<span class="display">' + ctaLabel + '</span>') + '</button>' +
    '</div>'
  );
}

function joinScreen() {
  return (
    '<div class="card col gap-4 pop" style="padding:24px;">' +
      '<button class="btn-link" id="btn-back" style="width:fit-content;">← Retour</button>' +
      '<div><h2 class="display" style="font-size:1.5rem;font-weight:700;margin:0;">Rejoindre une partie</h2><p class="muted small" style="margin:4px 0 0;">Demande le code à l\'animateur·rice.</p></div>' +
      '<div><label class="field-label">Code du salon</label><input type="text" id="input-code" placeholder="EX : ABCD" maxlength="4" value="' + escapeHtml(S.joinCodeInput) + '" style="font-family:\'Baloo 2\',sans-serif;font-size:1.4rem;letter-spacing:0.3em;text-align:center;" /></div>' +
      '<div><label class="field-label">Ton prénom</label><input type="text" id="input-name-join" placeholder="Ex : Camille" maxlength="20" value="' + escapeHtml(S.myName) + '" /></div>' +
      (S.error ? '<p class="small" style="color:#ff9ec9;margin:0;">' + escapeHtml(S.error) + '</p>' : '') +
      '<button class="btn btn-primary" id="btn-submit-join" ' + (S.busy ? 'disabled' : '') + '>' + (S.busy ? '<span class="spin">⏳</span>' : '<span class="display">Rejoindre</span>') + '</button>' +
    '</div>'
  );
}

function loadingScreen() {
  return '<div class="card col gap-3 pop text-center" style="padding:32px;align-items:center;"><span class="spin" style="font-size:1.6rem;">⏳</span><p class="small muted">Connexion au salon ' + escapeHtml(S.code) + '…</p></div>';
}

function lobbyScreen() {
  const room = S.room;
  const canStart = room.players.length >= 2;
  let html = '<div class="col gap-4 pop">';

  html += '<div class="col gap-2" style="align-items:center;">';
  html += '<span class="xs muted" style="text-transform:uppercase;letter-spacing:0.15em;">Code du salon</span>';
  html += '<button class="chip-code" id="btn-copy">' + S.code + ' ' + (S.copied ? '✅' : '📋') + '</button>';
  html += '<p class="xs muted">Touchez le code pour le copier</p>';
  html += '</div>';

  html += '<div class="card col gap-3" style="padding:20px;">';
  html += '<div class="row gap-2" style="align-items:center;"><span>👥</span><h3 class="display" style="margin:0;font-weight:700;">' + room.players.length + ' joueur(s)</h3></div>';
  html += '<div class="row gap-2" style="flex-wrap:wrap;">';
  room.players.forEach(p => {
    const isHost = p.id === room.hostId;
    html += '<span class="badge" style="background:' + (isHost ? 'rgba(255,210,63,0.16)' : 'rgba(255,255,255,0.07)') + ';">' + (isHost ? '👑 ' : '') + escapeHtml(p.name) + (p.id === S.myId ? ' (toi)' : '') + '</span>';
  });
  html += '</div>';
  if (!canStart) html += '<p class="xs muted">Il faut au moins 2 joueurs pour commencer.</p>';
  html += '</div>';

  if (S.isAdmin) {
    html += '<div class="card col gap-4" style="padding:20px;">';
    html += '<h3 class="display xs muted" style="text-transform:uppercase;letter-spacing:0.05em;margin:0;">Réglages de la partie</h3>';

    html += '<button class="toggle-row ' + (room.hotMode ? 'active' : '') + '" id="toggle-hot">' +
      '<div class="row gap-3" style="align-items:center;"><span>🔥</span><div><p style="margin:0;font-weight:700;font-size:0.9rem;">Mode Hot</p><p class="xs muted" style="margin:0;">Des questions plus osées et coquines.</p></div></div>' +
      '<div class="toggle-pill ' + (room.hotMode ? 'active' : '') + '"><div class="toggle-knob ' + (room.hotMode ? 'active' : '') + '"></div></div>' +
      '</button>';

    html += '<button class="toggle-row ' + (room.birthdayMode ? 'active' : '') + '" id="toggle-birthday">' +
      '<div class="row gap-3" style="align-items:center;"><span>🎂</span><div><p style="margin:0;font-weight:700;font-size:0.9rem;">Édition anniversaire</p><p class="xs muted" style="margin:0;">Des questions spéciales pour la personne fêtée.</p></div></div>' +
      '<div class="toggle-pill ' + (room.birthdayMode ? 'active' : '') + '"><div class="toggle-knob ' + (room.birthdayMode ? 'active' : '') + '"></div></div>' +
      '</button>';

    if (room.birthdayMode) {
      html += '<div class="col gap-2">';
      html += '<label class="field-label">Prénom de la personne fêtée</label>';
      html += '<div class="row gap-2"><input type="text" id="input-birthday-name" value="' + escapeHtml(S.birthdayNameInput) + '" style="flex:1;" /><button class="btn btn-secondary" id="btn-save-birthday-name" style="width:auto;padding:12px 16px;">OK</button></div>';
      html += '<p class="display text-center" style="color:#ffd23f;font-size:1.2rem;margin:4px 0 0;">🎉 Joyeux anniversaire ' + escapeHtml(room.birthdayName || "Julian") + ' 🎉</p>';
      html += '</div>';
    }

    const removedCount = room.removedDefaults ? Object.keys(room.removedDefaults).length : 0;
    const customCount = room.customQuestions ? Object.keys(room.customQuestions).length : 0;
    const editedCount = room.editedDefaults ? Object.keys(room.editedDefaults).length : 0;
    html += '<button class="btn btn-secondary" id="btn-open-manager">📝 Gérer les questions</button>';
    if (removedCount || customCount || editedCount) {
      const bits = [];
      if (customCount) bits.push(customCount + " ajoutée(s)");
      if (editedCount) bits.push(editedCount + " modifiée(s)");
      if (removedCount) bits.push(removedCount + " supprimée(s)");
      html += '<p class="xs muted" style="margin:-6px 0 0;">' + bits.join(" · ") + '</p>';
    }

    html += '<button class="btn btn-primary" id="btn-start" ' + (!canStart || S.busy ? 'disabled' : '') + '>' + (S.busy ? '<span class="spin">⏳</span>' : '<span class="display">Lancer la partie</span> →') + '</button>';
    html += '</div>';
  } else {
    html += '<div class="card col gap-2 text-center" style="padding:24px;align-items:center;"><span>✨</span><p class="small muted">En attente que <strong>' + escapeHtml(room.hostName) + '</strong> lance la partie…</p></div>';
  }

  html += '<button class="btn-link" id="btn-leave" style="align-self:center;">Quitter le salon</button>';
  html += '</div>';
  return html;
}

function manageQuestionsScreen() {
  const room = S.room;
  const categories = [
    { label: "Classiques", list: QUESTIONS_CLASSIC },
    { label: "Hot 🔥", list: QUESTIONS_HOT },
    { label: "Anniversaire 🎂", list: questionsBirthday(room.birthdayName) },
  ];

  let html = '<div class="col gap-4 pop">';
  html += '<div class="row between" style="align-items:center;">';
  html += '<button class="btn-link" id="btn-close-manager">← Retour au salon</button>';
  html += '<button class="btn-link" id="btn-restore-all">↺ Tout réinitialiser</button>';
  html += '</div>';
  html += '<h2 class="display" style="margin:0;font-size:1.4rem;">Gérer les questions</h2>';

  html += '<div class="card col gap-3" style="padding:18px;">';
  html += '<h3 class="display xs muted" style="text-transform:uppercase;margin:0;">Ajouter une question</h3>';
  html += '<div class="row gap-2"><input type="text" id="input-new-custom" placeholder="Qui est le plus susceptible de… ?" value="' + escapeHtml(S.qm.newCustomText) + '" style="flex:1;" /><button class="btn btn-secondary" id="btn-add-custom" style="width:auto;padding:12px 16px;">Ajouter</button></div>';
  html += '</div>';

  const customEntries = Object.entries(room.customQuestions || {});
  if (customEntries.length > 0) {
    html += '<div class="card col gap-2" style="padding:18px;">';
    html += '<h3 class="display xs muted" style="text-transform:uppercase;margin:0 0 4px;">Questions personnalisées</h3>';
    customEntries.forEach(([id, text]) => {
      const editing = S.qm.editingKey === "custom:" + id;
      html += '<div class="row gap-2" style="align-items:center;">';
      if (editing) {
        html += '<input type="text" class="qm-edit-input" data-custom-input="' + id + '" value="' + escapeHtml(S.qm.editingText) + '" style="flex:1;" />';
        html += '<button class="btn-link" data-save-custom="' + id + '">✔️</button>';
        html += '<button class="btn-link" data-cancel-edit="1">✖️</button>';
      } else {
        html += '<span class="small" style="flex:1;">' + escapeHtml(text) + '</span>';
        html += '<button class="btn-link" data-edit-custom="' + id + '">✏️</button>';
        html += '<button class="btn-link" data-delete-custom="' + id + '">🗑️</button>';
      }
      html += '</div>';
    });
    html += '</div>';
  }

  categories.forEach(cat => {
    html += '<div class="card col gap-2" style="padding:18px;">';
    html += '<h3 class="display xs muted" style="text-transform:uppercase;margin:0 0 4px;">' + cat.label + '</h3>';
    cat.list.forEach(qText => {
      const hash = hashQuestion(qText);
      const isRemoved = !!(room.removedDefaults && room.removedDefaults[hash]);
      const displayText = (room.editedDefaults && room.editedDefaults[hash]) || qText;
      const editing = S.qm.editingKey === "default:" + hash;
      html += '<div class="row gap-2" style="align-items:center;' + (isRemoved ? 'opacity:0.4;' : '') + '">';
      if (editing) {
        html += '<input type="text" class="qm-edit-input" data-default-input="' + hash + '" value="' + escapeHtml(S.qm.editingText) + '" style="flex:1;" />';
        html += '<button class="btn-link" data-save-default="' + hash + '">✔️</button>';
        html += '<button class="btn-link" data-cancel-edit="1">✖️</button>';
      } else {
        html += '<span class="small" style="flex:1;' + (isRemoved ? 'text-decoration:line-through;' : '') + '">' + escapeHtml(displayText) + '</span>';
        if (!isRemoved) html += '<button class="btn-link" data-edit-default="' + hash + '">✏️</button>';
        html += '<button class="btn-link" data-toggle-default="' + hash + '">' + (isRemoved ? '♻️' : '🗑️') + '</button>';
      }
      html += '</div>';
    });
    html += '</div>';
  });

  html += '</div>';
  return html;
}

function questionScreen() {
  const room = S.room;
  const question = room.questions[room.round];
  const votedCount = Object.keys(room.votes || {}).length;
  const totalPlayers = room.players.length;
  const myVote = (room.votes || {})[S.myId];

  let html = '<div class="col gap-4 pop">';
  html += '<div class="row between xs muted"><span>Question ' + (room.round + 1) + ' / ' + room.questions.length + '</span><span>' + votedCount + ' / ' + totalPlayers + ' ont voté</span></div>';
  html += '<div class="card text-center" style="padding:24px;"><p class="display" style="font-size:1.4rem;font-weight:700;margin:0;line-height:1.3;">' + escapeHtml(question) + '</p></div>';

  html += '<div class="col gap-2">';
  room.players.forEach(p => {
    html += '<button class="vote-btn ' + (myVote === p.id ? 'selected' : '') + '" data-vote-id="' + p.id + '">' + escapeHtml(p.name) + '</button>';
  });
  html += '</div>';

  if (S.isAdmin) {
    html += '<button class="btn btn-primary" id="btn-reveal"><span class="display">Voir les résultats</span> 🏆</button>';
  } else {
    html += '<p class="text-center xs muted">' + (myVote ? "Vote enregistré, en attente des autres…" : "Touche un prénom pour voter.") + '</p>';
  }
  html += '</div>';
  return html;
}

function resultsScreen() {
  const room = S.room;
  const question = room.questions[room.round];
  const counts = {};
  Object.values(room.votes || {}).forEach(targetId => { counts[targetId] = (counts[targetId] || 0) + 1; });
  const nameOf = (id) => { const p = room.players.find(p => p.id === id); return p ? p.name : "?"; };
  const maxCount = Math.max(1, ...Object.values(counts));
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const isLast = room.round + 1 >= room.questions.length;

  let html = '<div class="col gap-4 pop">';
  html += '<div class="card text-center" style="padding:20px;"><p class="small muted" style="margin:0;">' + escapeHtml(question) + '</p></div>';

  html += '<div class="card col gap-3" style="padding:20px;">';
  if (sorted.length === 0) {
    html += '<p class="text-center small muted">Personne n\'a voté pour cette question.</p>';
  }
  sorted.forEach(([targetId, count], i) => {
    const pct = (count / maxCount) * 100;
    html += '<div class="col gap-2" style="gap:4px;">';
    html += '<div class="row between small"><span style="font-weight:700;">' + (i === 0 ? '🏆 ' : '') + escapeHtml(nameOf(targetId)) + '</span><span class="muted">' + count + ' vote' + (count > 1 ? 's' : '') + '</span></div>';
    html += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + (i === 0 ? 'linear-gradient(90deg,#ff3e8e,#ffd23f)' : '#3eeac0') + ';"></div></div>';
    html += '</div>';
  });
  html += '</div>';

  html += '<div class="card" style="padding:20px;">';
  html += '<h4 class="display xs muted" style="text-transform:uppercase;margin:0 0 8px;">Qui a voté pour qui</h4>';
  html += '<div class="col" style="gap:6px;">';
  Object.entries(room.votes || {}).forEach(([voterId, targetId]) => {
    html += '<p class="small" style="margin:0;"><strong>' + escapeHtml(nameOf(voterId)) + '</strong> → ' + escapeHtml(nameOf(targetId)) + '</p>';
  });
  html += '</div></div>';

  if (S.isAdmin) {
    html += '<button class="btn btn-primary" id="btn-next"><span class="display">' + (isLast ? "Terminer la partie" : "Question suivante") + '</span> →</button>';
  } else {
    html += '<p class="text-center xs muted">En attente de la suite…</p>';
  }
  html += '</div>';
  return html;
}

function endScreen() {
  let html = '<div class="card col gap-3 pop text-center" style="padding:32px;align-items:center;">';
  html += '<span style="font-size:1.8rem;">🎉</span>';
  html += '<h2 class="display" style="font-size:1.5rem;font-weight:700;margin:0;">Merci d\'avoir joué !</h2>';
  html += '<p class="small muted" style="margin:0;">La partie est terminée. Belle soirée à tous 🎉</p>';
  if (S.isAdmin) {
    html += '<button class="btn btn-primary" id="btn-restart"><span class="display">Relancer une partie</span></button>';
  }
  html += '<button class="btn-link" id="btn-leave-end">Quitter le salon</button>';
  html += '</div>';
  return html;
}

/* -------------------------------- BINDINGS ----------------------------------- */

function bindEvents() {
  const on = (id, evt, fn) => { const el = document.getElementById(id); if (el) el.addEventListener(evt, fn); };

  on("btn-create", "click", () => { S.mode = "create"; S.error = ""; render(); });
  on("btn-join", "click", () => { S.mode = "join"; S.error = ""; render(); });
  on("btn-back", "click", () => { S.mode = "home"; S.error = ""; render(); });

  on("input-name", "input", (e) => { S.myName = e.target.value; });
  on("input-name", "keydown", (e) => { if (e.key === "Enter") handleCreate(); });
  on("btn-submit-create", "click", handleCreate);

  on("input-code", "input", (e) => { S.joinCodeInput = e.target.value.toUpperCase().slice(0, 4); });
  on("input-code", "keydown", (e) => { if (e.key === "Enter") handleJoin(); });
  on("input-name-join", "input", (e) => { S.myName = e.target.value; });
  on("input-name-join", "keydown", (e) => { if (e.key === "Enter") handleJoin(); });
  on("btn-submit-join", "click", handleJoin);

  on("btn-copy", "click", copyCode);
  on("toggle-hot", "click", () => toggleMode("hotMode"));
  on("toggle-birthday", "click", () => toggleMode("birthdayMode"));
  on("input-birthday-name", "input", (e) => { S.birthdayNameInput = e.target.value; });
  on("btn-save-birthday-name", "click", saveBirthdayName);
  on("btn-start", "click", handleStartGame);
  on("btn-leave", "click", resetToHome);
  on("btn-leave-end", "click", resetToHome);

  document.querySelectorAll("[data-vote-id]").forEach(el => {
    el.addEventListener("click", () => handleVote(el.getAttribute("data-vote-id")));
  });

  on("btn-reveal", "click", handleReveal);
  on("btn-next", "click", handleNextQuestion);
  on("btn-restart", "click", handleRestart);

  on("btn-open-manager", "click", () => { S.showManager = true; render(); });
  on("btn-close-manager", "click", () => { S.showManager = false; S.qm.editingKey = null; render(); });
  on("btn-restore-all", "click", restoreAllDefaults);
  on("input-new-custom", "input", (e) => { S.qm.newCustomText = e.target.value; });
  on("input-new-custom", "keydown", (e) => { if (e.key === "Enter") addCustomQuestion(); });
  on("btn-add-custom", "click", addCustomQuestion);

  document.querySelectorAll("[data-edit-default]").forEach(el => {
    el.addEventListener("click", () => {
      const hash = el.getAttribute("data-edit-default");
      const byHash = getAllDefaultsByHash(S.room.birthdayName);
      const current = (S.room.editedDefaults && S.room.editedDefaults[hash]) || byHash[hash] || "";
      startEditDefault(hash, current);
    });
  });
  document.querySelectorAll("[data-toggle-default]").forEach(el => {
    el.addEventListener("click", () => toggleRemoveDefault(el.getAttribute("data-toggle-default")));
  });
  document.querySelectorAll("[data-save-default]").forEach(el => {
    el.addEventListener("click", () => saveEditDefault(el.getAttribute("data-save-default")));
  });
  document.querySelectorAll("[data-default-input]").forEach(el => {
    el.addEventListener("input", (e) => { S.qm.editingText = e.target.value; });
    el.addEventListener("keydown", (e) => { if (e.key === "Enter") saveEditDefault(el.getAttribute("data-default-input")); });
  });
  document.querySelectorAll("[data-edit-custom]").forEach(el => {
    el.addEventListener("click", () => {
      const id = el.getAttribute("data-edit-custom");
      startEditCustom(id, (S.room.customQuestions || {})[id] || "");
    });
  });
  document.querySelectorAll("[data-save-custom]").forEach(el => {
    el.addEventListener("click", () => saveEditCustom(el.getAttribute("data-save-custom")));
  });
  document.querySelectorAll("[data-custom-input]").forEach(el => {
    el.addEventListener("input", (e) => { S.qm.editingText = e.target.value; });
    el.addEventListener("keydown", (e) => { if (e.key === "Enter") saveEditCustom(el.getAttribute("data-custom-input")); });
  });
  document.querySelectorAll("[data-delete-custom]").forEach(el => {
    el.addEventListener("click", () => deleteCustomQuestion(el.getAttribute("data-delete-custom")));
  });
  document.querySelectorAll("[data-cancel-edit]").forEach(el => {
    el.addEventListener("click", cancelEditQm);
  });
}

render();
</script>
