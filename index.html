function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function hashQuestion(text) {
  let h = 0;
  for (let i = 0; i < text.length; i++) { h = (h * 31 + text.charCodeAt(i)) | 0; }
  return "h" + (h >>> 0).toString(36);
}

}

      const h = hashQuestion(q);
      if (removed[h]) return null;
      return edited[h] || q;
    })
    .filter(Boolean);
}

function effectiveDefaultList(opts) {
  let list = QUESTIONS_CLASSIC.slice();
  if (opts.hotMode) list = list.concat(QUESTIONS_HOT);
  if (opts.birthdayMode) list = list.concat(questionsBirthday(opts.birthdayName));
  return effectiveList(list, opts);
}

function buildPool(opts) {
  const defaults = effectiveDefaultList(opts);
  const customs = opts.customQuestions ? Object.values(opts.customQuestions) : [];
  const base = shuffle(defaults).slice(0, Math.min(defaults.length, 20));
  return shuffle(base.concat(customs));
}

function effectiveTruthList(room) {
  const base = TRUTH_QUESTIONS.concat(room.hotMode ? TRUTH_QUESTIONS_HOT : []);
  const eff = effectiveList(base, { removedDefaults: room.removedDefaults, editedDefaults: room.editedDefaults });
  const customs = room.customTruths ? Object.values(room.customTruths) : [];
  return eff.concat(customs);
}
function effectiveDareList(room) {
  const base = DARE_CHALLENGES.concat(room.hotMode ? DARE_CHALLENGES_HOT : []);
  const eff = effectiveList(base, { removedDefaults: room.removedDefaults, editedDefaults: room.editedDefaults });
  const customs = room.customDares ? Object.values(room.customDares) : [];
  return eff.concat(customs);
}
function effectiveNeverList(room) {
  const base = NEVER_STATEMENTS.concat(room.hotMode ? NEVER_STATEMENTS_HOT : []);
  const eff = effectiveList(base, { removedDefaults: room.removedDefaults, editedDefaults: room.editedDefaults });
  const customs = room.customNever ? Object.values(room.customNever) : [];
  return eff.concat(customs);
}
function effectiveCocoBlackList(room) {
  const eff = effectiveList(BLACK_CARDS_COCO, { removedDefaults: room.removedDefaults, editedDefaults: room.editedDefaults });
  const customs = room.customCocoBlack ? Object.values(room.customCocoBlack) : [];
  return eff.concat(customs);
}
function effectiveCocoWhiteList(room) {
  const eff = effectiveList(WHITE_CARDS_COCO, { removedDefaults: room.removedDefaults, editedDefaults: room.editedDefaults });
  const customs = room.customCocoWhite ? Object.values(room.customCocoWhite) : [];
  return eff.concat(customs);
}

function makeId() {
  return "p" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}
function makeCode() {
  const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ";
  let c = "";
  for (let i = 0; i < 4; i++) c += letters[Math.floor(Math.random() * letters.length)];
  return c;
}
function escapeHtml(s) {
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

async function createRoomInDb(code, initialState, player) {
  await set(ref(db, "rooms/" + code + "/state"), initialState);
  await set(ref(db, "rooms/" + code + "/players/" + player.id), player);
}

const VOTE_LIKE_STATUSES = ["question", "results", "duel_vote", "duel_results"];

function buildRoomFromVal(val) {
  if (!val || !val.state) return null;
  const state = val.state;
  const playersObj = val.players || {};
  const players = Object.values(playersObj).sort((a, b) => a.joinedAt - b.joinedAt);
  let votes = {};
  if (VOTE_LIKE_STATUSES.indexOf(state.status) !== -1) {
    votes = (val.votes && val.votes[state.round]) || {};
  }
  let photos = {};
  if (state.gameMode === "photo") {
    photos = (val.photos && val.photos[state.round]) || {};
  }
  let cocoAnswers = {};
  if (state.gameMode === "coco") {
    cocoAnswers = (val.cocoAnswers && val.cocoAnswers[state.round]) || {};
  }
  return Object.assign({}, state, { players: players, votes: votes, photos: photos, cocoAnswers: cocoAnswers });
}

function playerName(room, id) {
  const p = room.players.find(p => p.id === id);
  return p ? p.name : "?";
}

async function handleCreate() {
  if (!S.myName.trim()) { S.error = "Entre ton prénom pour continuer."; render(); return; }
  S.busy = true; S.error = ""; render();
  let c = makeCode();
  let tries = 0;
  while ((await roomExists(c)) && tries < 8) { c = makeCode(); tries++; }
  const initial = {
    code: c, hostId: S.myId, hostName: S.myName.trim(),
    hotMode: false, birthdayMode: false, birthdayName: "Julian",
    gameMode: "vote",
    status: "lobby", questions: [], round: 0, createdAt: Date.now(),

  } catch (e) {
    S.busy = false;

    render();
    return;

  try {
    await addPlayer(c, { id: S.myId, name: S.myName.trim(), joinedAt: Date.now() });

    S.busy = false;
    S.error = "Impossible de rejoindre le salon. Vérifie ta connexion et réessaie.";
    render();
    return;
  }
  S.isAdmin = false; S.code = c; S.busy = false;
  render();
  startListening(c);
}

function resizeImageFile(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h && w > maxDim) { h = Math.round((h * maxDim) / w); w = maxDim; }
        else if (h >= w && h > maxDim) { w = Math.round((w * maxDim) / h); h = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ----------------------------- BLANC-MANGE COCO HOT --------------------------- */

const COCO_HAND_SIZE = 6;

function dealCocoHands(players, n, pool) {
  const hands = {};
  players.forEach(p => {
    const hand = [];
    const localUsed = {};
    for (let i = 0; i < n; i++) {
      const available = pool.filter(c => !localUsed[c]);
      const finalPool = available.length > 0 ? available : pool;
      const card = finalPool[Math.floor(Math.random() * finalPool.length)];
      hand.push(card);
      localUsed[card] = true;
    }
    hands[p.id] = hand;
  });
  return hands;
}

async function startCoco() {
  const blackCards = shuffle(effectiveCocoBlackList(S.room)).slice(0, 12);
  const whitePool = effectiveCocoWhiteList(S.room);
  const hands = dealCocoHands(S.room.players, COCO_HAND_SIZE, whitePool);
  const scores = {};
  S.room.players.forEach(p => { scores[p.id] = 0; });
  await updateRoomState(S.code, {
    status: "coco_submit", round: 0, cocoCards: blackCards, cocoHands: hands,
    cocoJudgeId: S.room.players[0].id, cocoWinnerId: null, cocoVoteOrder: null, scores: scores,
  });
}

function isJudge() {
  return S.room && S.myId === S.room.cocoJudgeId;

async function playCocoCard(cardText) {
  if (!S.room) return;
  const hand = (S.room.cocoHands && S.room.cocoHands[S.myId]) || [];
  if (hand.indexOf(cardText) === -1) return;
  await set(ref(db, "rooms/" + S.code + "/cocoAnswers/" + S.room.round + "/" + S.myId), cardText);

  const whitePool = effectiveCocoWhiteList(S.room);
  const remaining = hand.filter(c => c !== cardText);
  const localUsed = {};
  remaining.forEach(c => { localUsed[c] = true; });
  const available = whitePool.filter(c => !localUsed[c]);
  const finalPool = available.length > 0 ? available : whitePool;
  const newCard = finalPool[Math.floor(Math.random() * finalPool.length)];
  remaining.push(newCard);
  await updateRoomState(S.code, { ["cocoHands/" + S.myId]: remaining });
}

  if (!confettiPieces) {
    const colors = ["#ff3e8e", "#ffd23f", "#3eeac0", "#ff8a3e", "#a78bfa"];
    confettiPieces = Array.from({ length: 26 }).map((_, i) => ({
      left: Math.random() * 100,
      size: 6 + Math.random() * 8,
      color: colors[i % colors.length],
      duration: 4 + Math.random() * 4,
      delay: Math.random() * 6,
    }));
  }
  return confettiPieces.map(p =>
    '<div class="confetti-piece" style="left:' + p.left + '%;width:' + p.size + 'px;height:' + (p.size * 0.5) + 'px;background:' + p.color + ';animation-duration:' + p.duration + 's;animation-delay:' + p.delay + 's;"></div>'
  ).join("");
}

/* --------------------------------- RENDER ----------------------------------- */

function render() {
  const birthdayActive = S.room && S.room.birthdayMode;
  let inner = confettiHtml(birthdayActive);
  inner += '<div class="wrap">';

  if (!S.connected && S.code) {
    inner += '<div class="conn-dot offline" style="margin-bottom:10px;justify-content:center;display:flex;"><span class="dot"></span> Connexion perdue, nouvelle tentative…</div>';
  }

  const st = S.room ? S.room.status : null;

  if (!S.code && S.mode === "home") inner += homeScreen();
  else if (!S.code && S.mode === "create") inner += nameEntryScreen("Créer une partie", "Tu seras l'animateur·rice de la soirée.", "Créer le salon", "create");
  else if (!S.code && S.mode === "join") inner += joinScreen();
  else if (S.code && !S.room) inner += loadingScreen();
  else if (st === "lobby") inner += (S.showManager ? manageQuestionsScreen() : lobbyScreen());
  else if (st === "question") inner += questionScreen();
  else if (st === "results") inner += resultsScreen();
  else if (st === "td_choose") inner += tdChooseScreen();
  else if (st === "td_reveal") inner += tdRevealScreen();
  else if (st === "duel_vote") inner += duelVoteScreen();
  else if (st === "duel_results") inner += duelResultsScreen();
  else if (st === "never_prompt") inner += neverPromptScreen();
  else if (st === "photo_wait") inner += photoWaitScreen();
  else if (st === "photo_reveal") inner += photoRevealScreen();
  else if (st === "coco_submit") inner += cocoSubmitScreen();
  else if (st === "coco_vote") inner += cocoVoteScreen();
  else if (st === "coco_reveal") inner += cocoRevealScreen();
  else if (st === "ended") inner += endScreen();

  inner += '</div>';
  root.innerHTML = inner;
  bindEvents();
}

function manageQuestionsScreen() {
  const room = S.room;
  const mode = room.gameMode || "vote";
  const sections = getBankSections(mode, room);
  const modeInfo = GAME_MODES.find(m => m.key === mode);

  let html = '<div class="col gap-4 pop">';
  html += '<div class="row between" style="align-items:center;">';
  html += '<button class="btn-link" id="btn-close-manager">← Retour au salon</button>';
  html += '<button class="btn-link" id="btn-restore-all">↺ Tout réinitialiser</button>';
  html += '</div>';
  html += '<h2 class="display" style="margin:0;font-size:1.4rem;">Gérer le contenu</h2>';
  html += '<p class="xs muted" style="margin:-8px 0 0;">Mode actuel : ' + (modeInfo ? modeInfo.icon + ' ' + escapeHtml(modeInfo.title) : "") + '</p>';

  sections.forEach(section => {
    html += '<div class="card col gap-3" style="padding:18px;">';
    html += '<h3 class="display xs muted" style="text-transform:uppercase;margin:0;">' + escapeHtml(section.title) + '</h3>';

    const draft = S.qm.newTextByBank[section.customKey] || "";
    html += '<div class="row gap-2"><input type="text" class="qm-add-input" data-bank-input="' + section.customKey + '" placeholder="Ajouter une carte / question…" value="' + escapeHtml(draft) + '" style="flex:1;" /><button class="btn btn-secondary" data-add-bank="' + section.customKey + '" style="width:auto;padding:12px 16px;">Ajouter</button></div>';

    const customEntries = Object.entries(room[section.customKey] || {});
    if (customEntries.length > 0) {
      html += '<div class="col gap-2" style="margin-top:4px;">';
      html += '<p class="xs muted" style="margin:0;text-transform:uppercase;">Ajoutées</p>';
      customEntries.forEach(([id, text]) => {
        const editing = S.qm.editingKey === "bank:" + section.customKey + ":" + id;
        html += '<div class="row gap-2" style="align-items:center;">';
        if (editing) {
          html += '<input type="text" class="qm-edit-input" data-bank-edit-input="' + section.customKey + '|' + id + '" value="' + escapeHtml(S.qm.editingText) + '" style="flex:1;" />';
          html += '<button class="btn-link" data-bank-save="' + section.customKey + '|' + id + '">✔️</button>';
          html += '<button class="btn-link" data-cancel-edit="1">✖️</button>';
        } else {
          html += '<span class="small" style="flex:1;">' + escapeHtml(text) + '</span>';
          html += '<button class="btn-link" data-bank-edit="' + section.customKey + '|' + id + '">✏️</button>';
          html += '<button class="btn-link" data-bank-delete="' + section.customKey + '|' + id + '">🗑️</button>';
        }
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';

    section.subcats.forEach(cat => {
      html += '<div class="card col gap-2" style="padding:18px;">';
      html += '<h3 class="display xs muted" style="text-transform:uppercase;margin:0 0 4px;">' + escapeHtml(cat.label) + '</h3>';
      cat.list.forEach(qText => {
        const hash = hashQuestion(qText);
        const isRemoved = !!(room.removedDefaults && room.removedDefaults[hash]);
        const displayText = (room.editedDefaults && room.editedDefaults[hash]) || qText;
        const editing = S.qm.editingKey === "default:" + hash;
        html += '<div class="row gap-2" style="align-items:center;' + (isRemoved ? 'opacity:0.4;' : '') + '">';
        if (editing) {
          html += '<input type="text" class="qm-edit-input" data-default-input="' + hash + '" value="' + escapeHtml(S.qm.editingText) + '" style="flex:1;" />';
          html += '<button class="btn-link" data-save-default="' + hash + '">✔️</button>';
          html += '<button class="btn-link" data-cancel-edit="1">✖️</button>';
        } else {
          html += '<span class="small" style="flex:1;' + (isRemoved ? 'text-decoration:line-through;' : '') + '">' + escapeHtml(displayText) + '</span>';
          if (!isRemoved) html += '<button class="btn-link" data-edit-default="' + hash + '">✏️</button>';
          html += '<button class="btn-link" data-toggle-default="' + hash + '">' + (isRemoved ? '♻️' : '🗑️') + '</button>';
        }
        html += '</div>';
      });
      html += '</div>';
    });
  });

  html += '</div>';
  return html;
}

function questionScreen() {
  const room = S.room;
  const question = room.questions[room.round];
  const votedCount = Object.keys(room.votes || {}).length;
  const totalPlayers = room.players.length;

  let html = '<div class="col gap-4 pop">';
  html += '<div class="row between xs muted"><span>Question ' + (room.round + 1) + ' / ' + room.questions.length + '</span><span>' + votedCount + ' / ' + totalPlayers + ' ont voté</span></div>';
  html += '<div class="card big-card"><p class="display">' + escapeHtml(question) + '</p></div>';

  html += '<div class="col gap-2">';
  room.players.forEach(p => {
    html += '<button class="vote-btn ' + (myVote === p.id ? 'selected' : '') + '" data-vote-id="' + p.id + '">' + escapeHtml(p.name) + '</button>';
  });
  html += '</div>';

  if (S.isAdmin) {
    html += '<button class="btn btn-primary" id="btn-reveal"><span class="display">Voir les résultats</span> 🏆</button>';

function resultsScreen() {
  const room = S.room;
  const question = room.questions[room.round];
  const counts = {};
  Object.values(room.votes || {}).forEach(targetId => { counts[targetId] = (counts[targetId] || 0) + 1; });
  const nameOf = (id) => playerName(room, id);
  const maxCount = Math.max(1, ...Object.values(counts));
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const isLast = room.round + 1 >= room.questions.length;

  let html = '<div class="col gap-4 pop">';
  html += '<div class="card text-center" style="padding:20px;"><p class="small muted" style="margin:0;">' + escapeHtml(question) + '</p></div>';

  html += '<div class="card col gap-3" style="padding:20px;">';
  if (sorted.length === 0) {
    html += '<p class="text-center small muted">Personne n\'a voté pour cette question.</p>';
  }
  sorted.forEach(([targetId, count], i) => {
    const pct = (count / maxCount) * 100;
    html += '<div class="col gap-2" style="gap:4px;">';
    html += '<div class="row between small"><span style="font-weight:700;">' + (i === 0 ? '🏆 ' : '') + escapeHtml(nameOf(targetId)) + '</span><span class="muted">' + count + ' vote' + (count > 1 ? 's' : '') + '</span></div>';
    html += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + (i === 0 ? 'linear-gradient(90deg,#ff3e8e,#ffd23f)' : '#3eeac0') + ';"></div></div>';
    html += '</div>';
  });
  html += '</div>';

  html += '<div class="card" style="padding:20px;">';
  html += '<h4 class="display xs muted" style="text-transform:uppercase;margin:0 0 8px;">Qui a voté pour qui</h4>';
  html += '<div class="col" style="gap:6px;">';
  Object.entries(room.votes || {}).forEach(([voterId, targetId]) => {
    html += '<p class="small" style="margin:0;"><strong>' + escapeHtml(nameOf(voterId)) + '</strong> → ' + escapeHtml(nameOf(targetId)) + '</p>';
  });
  html += '</div></div>';

  if (S.isAdmin) {
    html += '<button class="btn btn-primary" id="btn-next"><span class="display">' + (isLast ? "Terminer la partie" : "Question suivante") + '</span> →</button>';
  } else {
    html += '<p class="text-center xs muted">En attente de la suite…</p>';
  }
  html += '</div>';
  return html;
}

function duelVoteScreen() {
  const room = S.room;
  const nameA = playerName(room, room.duelA);
  const nameB = playerName(room, room.duelB);
  const isContestant = S.myId === room.duelA || S.myId === room.duelB;
  const myVote = (room.votes || {})[S.myId];
  const votedCount = Object.keys(room.votes || {}).length;
  const spectatorCount = Math.max(0, room.players.length - 2);

  let html = '<div class="col gap-4 pop">';
  html += '<div class="row between xs muted"><span>Duel ' + (room.round + 1) + '</span><span>' + votedCount + ' / ' + spectatorCount + ' ont voté</span></div>';
  html += '<div class="card big-card"><p class="display">' + escapeHtml(room.duelQuestion) + '</p></div>';

  html += '<div class="duel-vs">';
  html += '<button class="duel-name-card ' + (myVote === "a" ? "selected" : "") + (isContestant ? " static" : "") + '" ' + (isContestant ? "disabled" : 'data-duel-vote="a"') + '>' + escapeHtml(nameA) + '</button>';
  html += '<span class="duel-vs-label">VS</span>';
  html += '<button class="duel-name-card ' + (myVote === "b" ? "selected" : "") + (isContestant ? " static" : "") + '" ' + (isContestant ? "disabled" : 'data-duel-vote="b"') + '>' + escapeHtml(nameB) + '</button>';
  html += '</div>';

  if (isContestant) {
    html += '<p class="text-center small muted">⚔️ Tu es en duel ! Attends les votes du public…</p>';
  } else {
    html += '<p class="text-center xs muted">' + (myVote ? "Vote enregistré, en attente des autres…" : "Vote pour le/la gagnant(e) du duel.") + '</p>';
  }

  if (S.isAdmin) {
    html += '<button class="btn btn-primary" id="btn-duel-reveal"><span class="display">Voir le résultat</span> 🏆</button>';
  }
  html += '</div>';
  return html;
}

function duelResultsScreen() {
  const room = S.room;
  const nameA = playerName(room, room.duelA);
  const nameB = playerName(room, room.duelB);
  let aCount = 0, bCount = 0;
  Object.values(room.votes || {}).forEach(v => { if (v === "a") aCount++; else if (v === "b") bCount++; });
  const total = Math.max(1, aCount + bCount);
  const winnerId = aCount >= bCount ? room.duelA : room.duelB;
  const isLast = room.round + 1 >= (room.duelPool || []).length;

  let html = '<div class="col gap-4 pop">';
  html += '<div class="card text-center" style="padding:16px;"><p class="small muted" style="margin:0;">' + escapeHtml(room.duelQuestion) + '</p></div>';

  html += '<div class="card col gap-3" style="padding:20px;">';
  html += '<div class="col gap-2"><div class="row between small"><span style="font-weight:700;">' + (winnerId === room.duelA ? '🏆 ' : '') + escapeHtml(nameA) + '</span><span class="muted">' + aCount + ' vote' + (aCount > 1 ? 's' : '') + '</span></div><div class="bar-track"><div class="bar-fill" style="width:' + ((aCount / total) * 100) + '%;background:' + (winnerId === room.duelA ? 'linear-gradient(90deg,#ff3e8e,#ffd23f)' : '#3eeac0') + ';"></div></div></div>';
  html += '<div class="col gap-2"><div class="row between small"><span style="font-weight:700;">' + (winnerId === room.duelB ? '🏆 ' : '') + escapeHtml(nameB) + '</span><span class="muted">' + bCount + ' vote' + (bCount > 1 ? 's' : '') + '</span></div><div class="bar-track"><div class="bar-fill" style="width:' + ((bCount / total) * 100) + '%;background:' + (winnerId === room.duelB ? 'linear-gradient(90deg,#ff3e8e,#ffd23f)' : '#3eeac0') + ';"></div></div></div>';
  html += '</div>';

  html += scoreboardHtml(room);

  if (S.isAdmin) {
    html += '<button class="btn btn-primary" id="btn-duel-next"><span class="display">' + (isLast ? "Terminer la partie" : "Duel suivant") + '</span> →</button>';
  } else {
    html += '<p class="text-center xs muted">En attente de la suite…</p>';
  }
  html += '</div>';
  return html;
}

function scoreboardHtml(room) {
  const scores = room.scores || {};
  const entries = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  if (entries.length === 0) return "";
  let html = '<div class="card" style="padding:18px;">';
  html += '<h4 class="display xs muted" style="text-transform:uppercase;margin:0 0 8px;">Tableau des scores</h4>';
  entries.forEach(([id, score], i) => {
    html += '<div class="scoreboard-row"><span class="small" style="font-weight:700;">' + (i === 0 && score > 0 ? '👑 ' : '') + escapeHtml(playerName(room, id)) + '</span><span class="small muted">' + score + ' pt' + (score > 1 ? 's' : '') + '</span></div>';
  });
  html += '</div>';
  return html;
}

/* ----------------------------- NEVER HAVE I SCREEN ----------------------------- */

function neverPromptScreen() {
  const room = S.room;
  const statement = (room.neverStatements || [])[room.round] || "";
  const answered = S.myGageAnsweredRound === room.round;
  const isLast = room.round + 1 >= (room.neverStatements || []).length;

  let html = '<div class="col gap-4 pop">';
  html += '<div class="row between xs muted"><span>Affirmation ' + (room.round + 1) + ' / ' + (room.neverStatements || []).length + '</span><span>Tes gages : ' + S.myGageCount + ' 🍹</span></div>';
  html += '<div class="card big-card"><p class="display">' + escapeHtml(statement) + '</p></div>';

  html += '<div class="row gap-3">';
  html += '<button class="btn btn-primary" id="btn-gage-yes" ' + (answered ? "disabled" : "") + ' style="flex:1;">🙋 J\'ai déjà</button>';
  html += '<button class="btn btn-secondary" id="btn-gage-no" ' + (answered ? "disabled" : "") + ' style="flex:1;">🙅 Jamais</button>';
  html += '</div>';
  if (answered) html += '<p class="text-center xs muted">Réponse enregistrée pour cette manche.</p>';

  if (S.isAdmin) {
    html += '<button class="btn btn-primary" id="btn-never-next"><span class="display">' + (isLast ? "Terminer la partie" : "Affirmation suivante") + '</span> →</button>';
  }
  html += '</div>';
  return html;
}

/* ------------------------------ PHOTO ROULETTE SCREENS ------------------------- */

function photoWaitScreen() {
  const room = S.room;
  const myPhotoDone = !!(room.photos && room.photos[S.myId]);
  const count = Object.keys(room.photos || {}).length;
  let html = '<div class="col gap-4 pop">';
  html += '<div class="card big-card"><p class="display">📸 Prends une photo maintenant !</p><p class="small muted" style="margin-top:8px;">Selfie, grimace, n\'importe quoi — surprends le groupe.</p></div>';

  html += '<input type="file" id="photo-input" accept="image/*" capture="user" style="display:none;" />';
  if (myPhotoDone) {
    html += '<button class="btn btn-secondary" id="btn-retake-photo">✅ Photo envoyée — reprendre</button>';
  } else {
    html += '<button class="btn btn-primary" id="btn-take-photo" ' + (S.busy ? 'disabled' : '') + '>' + (S.busy ? '<span class="spin">⏳</span>' : '📸 Prendre une photo') + '</button>';
  }

  html += '<p class="text-center xs muted">' + count + ' / ' + room.players.length + ' ont envoyé leur photo</p>';

  if (S.isAdmin) {
    html += '<button class="btn btn-primary" id="btn-launch-roulette" ' + (count < 1 ? "disabled" : "") + '><span class="display">Lancer la roulette</span> 🎰</button>';
  }
  html += '</div>';
  return html;
}

function photoRevealScreen() {
  const room = S.room;
  const order = room.photoRevealOrder || [];
  const idx = room.photoRevealIndex || 0;
  const currentId = order[idx];
  const photoData = (room.photos || {})[currentId];
  const showName = room.photoRevealShowName;
  const isLast = idx + 1 >= order.length;

  let html = '<div class="col gap-4 pop">';
  html += '<div class="xs muted text-center">Photo ' + (idx + 1) + ' / ' + order.length + '</div>';
  html += '<div class="photo-frame">' + (photoData ? '<img src="' + photoData + '" />' : '') + '</div>';
  html += '<div class="card text-center" style="padding:14px;"><p class="display" style="margin:0;font-size:1.2rem;">' + (showName ? '😄 C\'est ' + escapeHtml(playerName(room, currentId)) + ' !' : '🤔 Qui est-ce ?') + '</p></div>';

  if (S.isAdmin) {
    if (!showName) {
      html += '<button class="btn btn-primary" id="btn-photo-reveal-name"><span class="display">Révéler qui c\'est</span> 👀</button>';
    } else {
      html += '<button class="btn btn-primary" id="btn-photo-next"><span class="display">' + (isLast ? "Terminer la partie" : "Photo suivante") + '</span> →</button>';
    }
  } else {
    html += '<p class="text-center xs muted">En attente de l\'animateur·rice…</p>';
  }
  html += '</div>';
  return html;
}

/* ------------------------------ BLANC-MANGE COCO SCREENS ------------------------ */

function cocoSubmitScreen() {
  const room = S.room;
  const card = (room.cocoCards || [])[room.round] || "";
  const judgeName = playerName(room, room.cocoJudgeId);
  const amJudge = isJudge();
  const answers = room.cocoAnswers || {};
  const answeredCount = Object.keys(answers).length;
  const expected = Math.max(1, room.players.length - 1);
  const alreadyAnswered = !!answers[S.myId];
  const myHand = (room.cocoHands && room.cocoHands[S.myId]) || [];

  let html = '<div class="col gap-4 pop">';
  html += '<div class="xs muted text-center">Manche ' + (room.round + 1) + ' / ' + (room.cocoCards || []).length + ' · Juge : ' + escapeHtml(judgeName) + (amJudge ? " (toi) 👑" : "") + '</div>';
  html += '<div class="card big-card"><p class="display">' + escapeHtml(card) + '</p></div>';

  if (amJudge) {
    html += '<p class="text-center small muted">Tu es le/la juge 👑 — attends les cartes jouées…</p>';
  } else if (alreadyAnswered) {
    html += '<p class="text-center small muted">✅ Carte jouée, en attente des autres…</p>';
  } else {
    html += '<p class="xs muted" style="margin:0;">Choisis une carte de ta main :</p>';
    html += '<div class="col gap-2">';
    myHand.forEach(cardText => {
      html += '<button class="coco-answer-card clickable" data-coco-play="' + escapeHtml(cardText) + '">' + escapeHtml(cardText) + '</button>';
    });
    html += '</div>';
  }

  html += '<p class="text-center xs muted">' + answeredCount + ' / ' + expected + ' cartes jouées</p>';

  if (S.isAdmin) {
    html += '<button class="btn btn-primary" id="btn-coco-show" ' + (answeredCount < 1 ? "disabled" : "") + '><span class="display">Voir les réponses</span> 👀</button>';
  }
  html += '</div>';
  return html;
}

function cocoVoteScreen() {
  const room = S.room;
  const card = (room.cocoCards || [])[room.round] || "";
  const order = room.cocoVoteOrder || [];
  const answers = room.cocoAnswers || {};
  const amJudge = isJudge();

  let html = '<div class="col gap-4 pop">';
  html += '<div class="card text-center" style="padding:16px;"><p class="small muted" style="margin:0;">' + escapeHtml(card) + '</p></div>';
  html += '<div class="col gap-2">';
  order.forEach(id => {
    const text = answers[id] || "";
    html += '<button class="coco-answer-card ' + (amJudge ? "clickable" : "") + '" ' + (amJudge ? 'data-coco-pick="' + id + '"' : "disabled") + '>' + escapeHtml(text) + '</button>';
  });
  html += '</div>';

  if (amJudge) {
    html += '<p class="text-center xs muted">Touche la réponse la plus drôle pour élire le/la gagnant(e).</p>';
  } else {
    html += '<p class="text-center xs muted">Le/la juge élit la meilleure réponse…</p>';
  }
  html += '</div>';
  return html;
}

function cocoRevealScreen() {
  const room = S.room;
  const card = (room.cocoCards || [])[room.round] || "";
  const winnerText = (room.cocoAnswers || {})[room.cocoWinnerId] || "";
  const isLast = room.round + 1 >= (room.cocoCards || []).length;

  let html = '<div class="col gap-4 pop">';
  html += '<div class="card text-center" style="padding:16px;"><p class="small muted" style="margin:0;">' + escapeHtml(card) + '</p></div>';
  html += '<div class="coco-answer-card winner">' + escapeHtml(winnerText) + '</div>';
  html += '<p class="display text-center" style="color:#ffd23f;margin:0;">🏆 ' + escapeHtml(playerName(room, room.cocoWinnerId)) + ' remporte la manche !</p>';

  html += scoreboardHtml(room);

  if (S.isAdmin) {
    html += '<button class="btn btn-primary" id="btn-coco-next"><span class="display">' + (isLast ? "Terminer la partie" : "Manche suivante") + '</span> →</button>';
  } else {
    html += '<p class="text-center xs muted">En attente de la suite…</p>';
  }
  html += '</div>';
  return html;
}

/* ----------------------------------- END -------------------------------------- */

function endScreen() {
  const room = S.room;
  let html = '<div class="col gap-4 pop">';
  html += '<div class="card col gap-3 text-center" style="padding:32px;align-items:center;">';
  html += '<span style="font-size:1.8rem;">🎉</span>';
  html += '<h2 class="display" style="font-size:1.5rem;font-weight:700;margin:0;">Merci d\'avoir joué !</h2>';
  html += '<p class="small muted" style="margin:0;">La partie est terminée. Belle soirée à tous 🎉</p>';
  html += '</div>';

  if (room && room.scores) html += scoreboardHtml(room);

  html += '<div class="col gap-2" style="align-items:center;">';
  if (S.isAdmin) {
    html += '<button class="btn btn-primary" id="btn-restart" style="width:100%;"><span class="display">Relancer une partie</span></button>';
  }
  html += '<button class="btn-link" id="btn-leave-end">Quitter le salon</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

/* -------------------------------- BINDINGS ----------------------------------- */

function bindEvents() {
  const on = (id, evt, fn) => { const el = document.getElementById(id); if (el) el.addEventListener(evt, fn); };

  on("btn-create", "click", () => { S.mode = "create"; S.error = ""; render(); });
  on("btn-join", "click", () => { S.mode = "join"; S.error = ""; render(); });
  on("btn-back", "click", () => { S.mode = "home"; S.error = ""; render(); });

  on("input-name", "input", (e) => { S.myName = e.target.value; });
  on("input-name", "keydown", (e) => { if (e.key === "Enter") handleCreate(); });
  on("btn-submit-create", "click", handleCreate);

  on("input-code", "input", (e) => { S.joinCodeInput = e.target.value.toUpperCase().slice(0, 4); });
  on("input-code", "keydown", (e) => { if (e.key === "Enter") handleJoin(); });
  on("input-name-join", "input", (e) => { S.myName = e.target.value; });
  on("input-name-join", "keydown", (e) => { if (e.key === "Enter") handleJoin(); });
  on("btn-submit-join", "click", handleJoin);

  on("btn-copy", "click", copyCode);
  on("toggle-hot", "click", () => toggleMode("hotMode"));
  on("toggle-birthday", "click", () => toggleMode("birthdayMode"));
  on("input-birthday-name", "input", (e) => { S.birthdayNameInput = e.target.value; });
  on("btn-save-birthday-name", "click", saveBirthdayName);
  on("btn-start", "click", handleStartGame);
  on("btn-leave", "click", resetToHome);
  on("btn-leave-end", "click", resetToHome);
  on("btn-restart", "click", handleRestart);

  document.querySelectorAll("[data-select-mode]").forEach(el => {
    el.addEventListener("click", () => selectGameMode(el.getAttribute("data-select-mode")));
  });

  // Vote mode
  document.querySelectorAll("[data-vote-id]").forEach(el => {
    el.addEventListener("click", () => handleVote(el.getAttribute("data-vote-id")));
  });
  on("btn-reveal", "click", handleReveal);
  on("btn-next", "click", handleNextQuestion);

  // Question / card manager
  on("btn-open-manager", "click", () => { S.showManager = true; render(); });
  on("btn-close-manager", "click", () => { S.showManager = false; S.qm.editingKey = null; render(); });
  on("btn-restore-all", "click", restoreAllDefaults);

  document.querySelectorAll("[data-bank-input]").forEach(el => {
    el.addEventListener("input", (e) => { S.qm.newTextByBank[el.getAttribute("data-bank-input")] = e.target.value; });
    el.addEventListener("keydown", (e) => { if (e.key === "Enter") addBankCustom(el.getAttribute("data-bank-input")); });
  });
  document.querySelectorAll("[data-add-bank]").forEach(el => {
    el.addEventListener("click", () => addBankCustom(el.getAttribute("data-add-bank")));
  });
  document.querySelectorAll("[data-bank-edit]").forEach(el => {
    el.addEventListener("click", () => {
      const parts = el.getAttribute("data-bank-edit").split("|");
      const bankKey = parts[0], id = parts[1];
      const current = ((S.room[bankKey] || {})[id]) || "";
      startEditBankCustom(bankKey, id, current);
    });
  });
  document.querySelectorAll("[data-bank-save]").forEach(el => {
    el.addEventListener("click", () => {
      const parts = el.getAttribute("data-bank-save").split("|");
      saveEditBankCustom(parts[0], parts[1]);
    });
  });
  document.querySelectorAll("[data-bank-edit-input]").forEach(el => {
    el.addEventListener("input", (e) => { S.qm.editingText = e.target.value; });
    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const parts = el.getAttribute("data-bank-edit-input").split("|");
        saveEditBankCustom(parts[0], parts[1]);
      }
    });
  });
  document.querySelectorAll("[data-bank-delete]").forEach(el => {
    el.addEventListener("click", () => {
      const parts = el.getAttribute("data-bank-delete").split("|");
      deleteBankCustom(parts[0], parts[1]);
    });
  });

  document.querySelectorAll("[data-edit-default]").forEach(el => {
    el.addEventListener("click", () => {
      const hash = el.getAttribute("data-edit-default");
      const byHash = getAllDefaultsByHash(S.room.birthdayName);
      const current = (S.room.editedDefaults && S.room.editedDefaults[hash]) || byHash[hash] || "";
      startEditDefault(hash, current);
    });
  });
  document.querySelectorAll("[data-toggle-default]").forEach(el => {
    el.addEventListener("click", () => toggleRemoveDefault(el.getAttribute("data-toggle-default")));
  });
  document.querySelectorAll("[data-save-default]").forEach(el => {
    el.addEventListener("click", () => saveEditDefault(el.getAttribute("data-save-default")));
  });
  document.querySelectorAll("[data-default-input]").forEach(el => {
    el.addEventListener("input", (e) => { S.qm.editingText = e.target.value; });
    el.addEventListener("keydown", (e) => { if (e.key === "Enter") saveEditDefault(el.getAttribute("data-default-input")); });
  });
  document.querySelectorAll("[data-cancel-edit]").forEach(el => {
    el.addEventListener("click", cancelEditQm);
  });

  // Truth or Dare
  on("btn-td-truth", "click", () => handleTdChoice("truth"));
  on("btn-td-dare", "click", () => handleTdChoice("dare"));
  on("btn-td-next", "click", handleTdNext);
  on("btn-td-end", "click", handleTdEnd);

  // Duel
  document.querySelectorAll("[data-duel-vote]").forEach(el => {
    el.addEventListener("click", () => handleDuelVote(el.getAttribute("data-duel-vote")));
  });
  on("btn-duel-reveal", "click", handleDuelReveal);
  on("btn-duel-next", "click", handleDuelNext);

  // Never have I ever
  on("btn-gage-yes", "click", () => handleGageAnswer(true));
  on("btn-gage-no", "click", () => handleGageAnswer(false));
  on("btn-never-next", "click", handleNeverNext);

  // Photo roulette
  on("btn-take-photo", "click", () => { const el = document.getElementById("photo-input"); if (el) el.click(); });
  on("btn-retake-photo", "click", () => { const el = document.getElementById("photo-input"); if (el) el.click(); });
  on("photo-input", "change", (e) => { if (e.target.files && e.target.files[0]) handlePhotoSelected(e.target.files[0]); });
  on("btn-launch-roulette", "click", handleLaunchRoulette);
  on("btn-photo-reveal-name", "click", handlePhotoRevealName);
  on("btn-photo-next", "click", handlePhotoNext);

  // Blanc-Manger Coco Hot
  document.querySelectorAll("[data-coco-play]").forEach(el => {
    el.addEventListener("click", () => playCocoCard(el.getAttribute("data-coco-play")));
  });
  on("btn-coco-show", "click", handleCocoShowAnswers);
  document.querySelectorAll("[data-coco-pick]").forEach(el => {
    el.addEventListener("click", () => handleCocoPick(el.getAttribute("data-coco-pick")));
  });
  on("btn-coco-next", "click", handleCocoNext);
}

render();
</script>
</body>
</html>
